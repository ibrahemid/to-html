<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">


<title>Press kit</title>
<style>:root {
  color-scheme: light dark;
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --accent: #6d28d9;
  --accent-soft: rgba(109, 40, 217, 0.08);
  --accent-line: rgba(109, 40, 217, 0.2);
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;
  --serif: "Charter", "Iowan Old Style", "Source Serif Pro", "Georgia", "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --mono: ui-monospace, "JetBrains Mono", "SF Mono", "Fira Code", Menlo, Consolas, monospace;
  --reading-family: var(--sans);
  --reading-size: 18px;
  --reading-leading: 1.62;
  --reading-measure: 66ch;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 14px;
}

:root[data-theme="light"] { color-scheme: light; }
:root[data-theme="dark"],
:root[data-theme="sepia"] { color-scheme: dark; }

:root[data-size="s"]  { --reading-size: 16px; }
:root[data-size="m"]  { --reading-size: 18px; }
:root[data-size="l"]  { --reading-size: 19.5px; }
:root[data-size="xl"] { --reading-size: 21px; }

:root[data-width="narrow"]      { --reading-measure: 56ch; }
:root[data-width="comfortable"] { --reading-measure: 66ch; }
:root[data-width="wide"]        { --reading-measure: 76ch; }

:root[data-family="serif"] { --reading-family: var(--serif); }
:root[data-family="sans"]  { --reading-family: var(--sans); }

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e0e10;
    --bg-elev: #17171a;
    --bg-sunken: #0a0a0c;
    --fg: #e8e8ee;
    --fg-muted: #b3b3bb;
    --fg-faint: #9e9ea6;
    --accent: #c4b5fd;
    --accent-soft: rgba(196, 181, 253, 0.10);
    --accent-line: rgba(196, 181, 253, 0.28);
    --border: #26262b;
    --border-strong: #3a3a40;
    --code-bg: #1a1a1f;
    --code-fg: #e8e8ee;
  }
}

:root[data-theme="dark"] {
  --bg: #0e0e10;
  --bg-elev: #17171a;
  --bg-sunken: #0a0a0c;
  --fg: #e8e8ee;
  --fg-muted: #b3b3bb;
  --fg-faint: #9e9ea6;
  --accent: #c4b5fd;
  --accent-soft: rgba(196, 181, 253, 0.10);
  --accent-line: rgba(196, 181, 253, 0.28);
  --border: #26262b;
  --border-strong: #3a3a40;
  --code-bg: #1a1a1f;
  --code-fg: #e8e8ee;
}

:root[data-theme="light"] {
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;
}

:root[data-theme="sepia"] {
  --bg: #f4ecd8;
  --bg-elev: #faf3e0;
  --bg-sunken: #ede2c4;
  --fg: #4a3a22;
  --fg-muted: #6b573b;
  --fg-faint: #6d5d40;
  --accent: #934f1b;
  --accent-soft: rgba(147, 79, 27, 0.08);
  --accent-line: rgba(147, 79, 27, 0.22);
  --border: #d9c8a3;
  --border-strong: #c2ad7f;
  --code-bg: #ebdfc2;
  --code-fg: #4a3a22;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection {
  background: var(--accent-soft);
  color: var(--fg);
}

a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-line);
  transition: border-color 120ms ease;
}

@media (prefers-reduced-motion: reduce) {
  a { transition: none !important; }
  .cc-section-flash { animation: none !important; }
}
a:hover { border-bottom-color: var(--accent); }

code {
  font-family: var(--mono);
  font-size: 0.875em;
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 4px;
}

pre {
  background: var(--code-bg);
  color: var(--code-fg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  overflow-x: auto;
  font-size: 0.875rem;
  line-height: 1.6;
}
pre code { background: transparent; padding: 0; font-size: inherit; }

table {
  border-collapse: collapse;
  width: 100%;
  margin: 1.2em 0;
  font-size: 0.9375rem;
}
th, td {
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
th {
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
}

hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 2.4em 0;
}

blockquote {
  margin: 1.2em 0;
  padding: 4px 0 4px 20px;
  border-left: 2px solid var(--accent-line);
  color: var(--fg-muted);
  font-style: italic;
}

.cc-stamp {
  position: fixed;
  bottom: 14px;
  left: 16px;
  font-family: var(--mono);
  font-size: 0.6875rem;
  color: var(--fg-faint);
  letter-spacing: 0.04em;
  z-index: 10;
}

.cc-tldr {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 28px auto 0;
  padding: 18px 22px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  background: var(--bg-elev);
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 18px;
  align-items: start;
}

.cc-tldr-label {
  font-family: var(--mono);
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  padding-top: 4px;
}

.cc-tldr-body {
  color: var(--fg);
  font-size: 1rem;
  line-height: 1.55;
}

.cc-tldr-body p { margin: 0 0 0.5em; }
.cc-tldr-body p:last-child { margin-bottom: 0; }

.cc-map {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 20px auto 0;
}

.cc-map-toc {
  padding: 12px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
}

.cc-toc-rail .cc-toc-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
}

.cc-toc-item a {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--fg-muted);
  border: none;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--bg-sunken);
}

.cc-toc-item a:hover {
  color: var(--fg);
  background: var(--accent-soft);
}

.cc-toc-l1 a { color: var(--fg); font-weight: 600; }
.cc-toc-l3 a { font-size: 0.92em; }

.tpl-asset-grid {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--reading-family);
}
.cc-ag {
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 24px 96px;
}
.cc-ag-header { margin-bottom: 28px; max-width: 720px; }
.cc-ag-h1 {
  font-family: var(--sans);
  font-size: 1.9rem;
  font-weight: 650;
  letter-spacing: -0.02em;
  margin: 0;
}
.cc-ag-sub { color: var(--fg-muted); margin: 6px 0 0; font-size: 1.05rem; }
.cc-ag-meta { color: var(--fg-faint); margin: 10px 0 0; font-size: 0.85rem; font-family: var(--mono); }
.cc-ag-grid {
  display: grid;
  gap: 18px;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
}
.cc-ag-card {
  display: flex;
  flex-direction: column;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color 180ms ease;
}
.cc-ag-card:hover { border-color: var(--border-strong); }
.cc-ag-preview {
  aspect-ratio: 4 / 3;
  background: var(--bg-sunken);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.cc-ag-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cc-ag-preview-empty span {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--fg-faint);
}
.cc-ag-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.cc-ag-name {
  font-family: var(--sans);
  font-size: 1rem;
  font-weight: 620;
  letter-spacing: -0.01em;
  margin: 0;
  word-break: break-word;
}
.cc-ag-caption { color: var(--fg-muted); font-size: 0.88rem; margin: 0; }
.cc-ag-dls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
.cc-ag-dl {
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
}
.cc-ag-dl:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
@media (max-width: 540px) {
  .cc-ag { padding: 28px 16px 64px; }
  .cc-ag-h1 { font-size: 1.55rem; }
  .cc-ag-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
}
</style>
</head>
<body class="tpl-asset-grid">
<div class="cc-stamp">to-html</div>


<div class="cc-ag"><header class="cc-ag-header"><h1 class="cc-ag-h1">Press kit</h1><p class="cc-ag-sub">logos and screenshots</p><p class="cc-ag-meta">to-html</p></header><div class="cc-ag-grid"><article class="cc-ag-card"><div class="cc-ag-preview cc-ag-preview-empty" aria-hidden="true"><span>WO</span></div><div class="cc-ag-body"><h2 class="cc-ag-name">Wordmark</h2><p class="cc-ag-caption">SVG and PNG</p><div class="cc-ag-dls"><a class="cc-ag-dl" href="https://example.com/wordmark.svg" rel="noopener noreferrer" download>SVG</a><a class="cc-ag-dl" href="https://example.com/wordmark.png" rel="noopener noreferrer" download>PNG</a></div></div></article><article class="cc-ag-card"><div class="cc-ag-preview"><img src="data:image/png;base64,iVBORw0KGgo=" alt="app icon" loading="lazy"></div><div class="cc-ag-body"><h2 class="cc-ag-name">App icon</h2><p class="cc-ag-caption">512px</p><div class="cc-ag-dls"><a class="cc-ag-dl" href="https://example.com/icon.png" rel="noopener noreferrer" download>PNG</a></div></div></article><article class="cc-ag-card"><div class="cc-ag-preview cc-ag-preview-empty" aria-hidden="true"><span>SC</span></div><div class="cc-ag-body"><h2 class="cc-ag-name">Screenshot</h2><div class="cc-ag-dls"><a class="cc-ag-dl" href="https://example.com/shot.png" rel="noopener noreferrer" download>Download</a></div></div></article></div></div>




</body>
</html>
