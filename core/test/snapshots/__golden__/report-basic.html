<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">


<title>Dependency report</title>
<style>:root {
  color-scheme: light dark;
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --accent: #6d28d9;
  --accent-soft: rgba(109, 40, 217, 0.08);
  --accent-line: rgba(109, 40, 217, 0.2);
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;
  --serif: "Charter", "Iowan Old Style", "Source Serif Pro", "Georgia", "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --mono: ui-monospace, "JetBrains Mono", "SF Mono", "Fira Code", Menlo, Consolas, monospace;
  --reading-family: var(--sans);
  --reading-size: 18px;
  --reading-leading: 1.62;
  --reading-measure: 66ch;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 14px;
}

:root[data-theme="light"] { color-scheme: light; }
:root[data-theme="dark"],
:root[data-theme="sepia"] { color-scheme: dark; }

:root[data-size="s"]  { --reading-size: 16px; }
:root[data-size="m"]  { --reading-size: 18px; }
:root[data-size="l"]  { --reading-size: 19.5px; }
:root[data-size="xl"] { --reading-size: 21px; }

:root[data-width="narrow"]      { --reading-measure: 56ch; }
:root[data-width="comfortable"] { --reading-measure: 66ch; }
:root[data-width="wide"]        { --reading-measure: 76ch; }

:root[data-family="serif"] { --reading-family: var(--serif); }
:root[data-family="sans"]  { --reading-family: var(--sans); }

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e0e10;
    --bg-elev: #17171a;
    --bg-sunken: #0a0a0c;
    --fg: #e8e8ee;
    --fg-muted: #b3b3bb;
    --fg-faint: #9e9ea6;
    --accent: #c4b5fd;
    --accent-soft: rgba(196, 181, 253, 0.10);
    --accent-line: rgba(196, 181, 253, 0.28);
    --border: #26262b;
    --border-strong: #3a3a40;
    --code-bg: #1a1a1f;
    --code-fg: #e8e8ee;
  }
}

:root[data-theme="dark"] {
  --bg: #0e0e10;
  --bg-elev: #17171a;
  --bg-sunken: #0a0a0c;
  --fg: #e8e8ee;
  --fg-muted: #b3b3bb;
  --fg-faint: #9e9ea6;
  --accent: #c4b5fd;
  --accent-soft: rgba(196, 181, 253, 0.10);
  --accent-line: rgba(196, 181, 253, 0.28);
  --border: #26262b;
  --border-strong: #3a3a40;
  --code-bg: #1a1a1f;
  --code-fg: #e8e8ee;
}

:root[data-theme="light"] {
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;
}

:root[data-theme="sepia"] {
  --bg: #f4ecd8;
  --bg-elev: #faf3e0;
  --bg-sunken: #ede2c4;
  --fg: #4a3a22;
  --fg-muted: #6b573b;
  --fg-faint: #6d5d40;
  --accent: #934f1b;
  --accent-soft: rgba(147, 79, 27, 0.08);
  --accent-line: rgba(147, 79, 27, 0.22);
  --border: #d9c8a3;
  --border-strong: #c2ad7f;
  --code-bg: #ebdfc2;
  --code-fg: #4a3a22;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection {
  background: var(--accent-soft);
  color: var(--fg);
}

a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-line);
  transition: border-color 120ms ease;
}

@media (prefers-reduced-motion: reduce) {
  a { transition: none !important; }
  .cc-section-flash { animation: none !important; }
}
a:hover { border-bottom-color: var(--accent); }

code {
  font-family: var(--mono);
  font-size: 0.875em;
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 4px;
}

pre {
  background: var(--code-bg);
  color: var(--code-fg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  overflow-x: auto;
  font-size: 0.875rem;
  line-height: 1.6;
}
pre code { background: transparent; padding: 0; font-size: inherit; }

table {
  border-collapse: collapse;
  width: 100%;
  margin: 1.2em 0;
  font-size: 0.9375rem;
}
th, td {
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
th {
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
}

hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 2.4em 0;
}

blockquote {
  margin: 1.2em 0;
  padding: 4px 0 4px 20px;
  border-left: 2px solid var(--accent-line);
  color: var(--fg-muted);
  font-style: italic;
}

.cc-stamp {
  position: fixed;
  bottom: 14px;
  left: 16px;
  font-family: var(--mono);
  font-size: 0.6875rem;
  color: var(--fg-faint);
  letter-spacing: 0.04em;
  z-index: 10;
}

.cc-tldr {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 28px auto 0;
  padding: 18px 22px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  background: var(--bg-elev);
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 18px;
  align-items: start;
}

.cc-tldr-label {
  font-family: var(--mono);
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  padding-top: 4px;
}

.cc-tldr-body {
  color: var(--fg);
  font-size: 1rem;
  line-height: 1.55;
}

.cc-tldr-body p { margin: 0 0 0.5em; }
.cc-tldr-body p:last-child { margin-bottom: 0; }

.cc-map {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 20px auto 0;
}

.cc-map-toc {
  padding: 12px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
}

.cc-toc-rail .cc-toc-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
}

.cc-toc-item a {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--fg-muted);
  border: none;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--bg-sunken);
}

.cc-toc-item a:hover {
  color: var(--fg);
  background: var(--accent-soft);
}

.cc-toc-l1 a { color: var(--fg); font-weight: 600; }
.cc-toc-l3 a { font-size: 0.92em; }

.tpl-report {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--reading-family);
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
}
.cc-rep {
  max-width: 900px;
  margin: 0 auto;
  padding: 48px 24px 96px;
}
.cc-rep-header { margin-bottom: 8px; }
.cc-rep-title {
  font-family: var(--sans);
  font-size: 1.9rem;
  font-weight: 650;
  letter-spacing: -0.02em;
  margin: 0;
}
.cc-rep-sub { color: var(--fg-muted); margin: 6px 0 0; font-size: 1.05rem; }
.cc-rep-meta { color: var(--fg-faint); margin: 10px 0 0; font-size: 0.85rem; font-family: var(--mono); }
.cc-rep-section { margin-top: 36px; }
.cc-rep-h {
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-muted);
  margin: 0 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.cc-rep-summary { color: var(--fg-muted); margin-bottom: 14px; }
.cc-rep-summary > :first-child { margin-top: 0; }
.cc-rep-summary > :last-child { margin-bottom: 0; }
.cc-rep-tablewrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
}
.cc-rep-tablewrap table { margin: 0; }
.cc-rep-tablewrap th {
  background: var(--bg-sunken);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.cc-rep-tablewrap td { border-bottom: 1px solid var(--border); }
.cc-rep-tablewrap tr:last-child td { border-bottom: none; }
.cc-rep-links {
  list-style: none;
  margin: 14px 0 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.cc-rep-links a {
  color: var(--accent);
  font-size: 0.95rem;
  border-bottom: 1px solid var(--accent-line);
}
.cc-rep-links a:hover { border-bottom-color: var(--accent); }
@media (max-width: 540px) {
  .cc-rep { padding: 28px 16px 64px; }
  .cc-rep-title { font-size: 1.55rem; }
}
</style>
</head>
<body class="tpl-report">
<div class="cc-stamp">to-html</div>


<div class="cc-rep"><header class="cc-rep-header"><h1 class="cc-rep-title">Dependency report</h1><p class="cc-rep-sub">three packages flagged</p><p class="cc-rep-meta">to-html · 2026-07-01 · weekly sweep</p></header><section class="cc-rep-section"><h2 class="cc-rep-h">Outdated</h2><div class="cc-rep-summary"><p>Bumps available this week.</p>
</div><div class="cc-rep-tablewrap"><table><thead><tr><th>Package</th><th>Current</th><th>Latest</th></tr></thead><tbody><tr><td>marked</td><td>9.1.0</td><td>12.0.0</td></tr><tr><td>node</td><td>18</td><td>22</td></tr></tbody></table></div><ul class="cc-rep-links"><li><a href="https://example.com/changelog" rel="noopener noreferrer">Changelog</a></li></ul></section><section class="cc-rep-section"><h2 class="cc-rep-h">References</h2><ul class="cc-rep-links"><li><a href="https://example.com/policy" rel="noopener noreferrer">Update policy</a></li></ul></section></div>




</body>
</html>
