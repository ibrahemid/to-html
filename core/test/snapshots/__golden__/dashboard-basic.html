<style>:root {
  color-scheme: light dark;
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --accent: #6d28d9;
  --accent-soft: rgba(109, 40, 217, 0.08);
  --accent-line: rgba(109, 40, 217, 0.2);
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;
  --serif: "Charter", "Iowan Old Style", "Source Serif Pro", "Georgia", "Times New Roman", serif;

  --reading-family: var(--sans);

  --reading-leading: 1.62;
  --reading-measure: 66ch;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 14px;
}

:root[data-theme="light"] { color-scheme: light; }
:root[data-theme="dark"],
:root[data-theme="sepia"] { color-scheme: dark; }

:root[data-size="s"]  { --reading-size: 16px; }

:root[data-size="l"]  { --reading-size: 19.5px; }

:root[data-width="narrow"]      { --reading-measure: 56ch; }

:root[data-family="serif"] { --reading-family: var(--serif); }
:root[data-family="sans"]  { --reading-family: var(--sans); }

@media (prefers-color-scheme: dark) {

  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection {
  background: var(--accent-soft);
  color: var(--fg);
}

a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-line);
  transition: border-color 120ms ease;
}

@media (prefers-reduced-motion: reduce) {
  a { transition: none !important; }
  .cc-section-flash { animation: none !important; }
}
a:hover { border-bottom-color: var(--accent); }

code {
  font-family: var(--mono);
  font-size: 0.875em;
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 4px;
}

pre {
  background: var(--code-bg);
  color: var(--code-fg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  overflow-x: auto;
  font-size: 0.875rem;
  line-height: 1.6;
}
pre code { background: transparent; padding: 0; font-size: inherit; }

table {
  border-collapse: collapse;
  width: 100%;
  margin: 1.2em 0;
  font-size: 0.9375rem;
}
th, td {
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
th {
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
}

hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 2.4em 0;
}

blockquote {
  margin: 1.2em 0;
  padding: 4px 0 4px 20px;
  border-left: 2px solid var(--accent-line);
  color: var(--fg-muted);
  font-style: italic;
}

.cc-stamp {
  position: fixed;
  bottom: 14px;
  left: 16px;
  font-family: var(--mono);
  font-size: 0.6875rem;
  color: var(--fg-faint);
  letter-spacing: 0.04em;
  z-index: 10;
}

.cc-tldr {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 28px auto 0;
  padding: 18px 22px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  background: var(--bg-elev);
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 18px;
  align-items: start;
}

.cc-tldr-label {
  font-family: var(--mono);
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  padding-top: 4px;
}

.cc-tldr-body {
  color: var(--fg);
  font-size: 1rem;
  line-height: 1.55;
}

.cc-tldr-body p { margin: 0 0 0.5em; }
.cc-tldr-body p:last-child { margin-bottom: 0; }

.cc-map {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 20px auto 0;
}

.cc-map-toc {
  padding: 12px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
}

.cc-toc-rail .cc-toc-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
}

.cc-toc-item a {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--fg-muted);
  border: none;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--bg-sunken);
}

.cc-toc-item a:hover {
  color: var(--fg);
  background: var(--accent-soft);
}

.cc-toc-l1 a { color: var(--fg); font-weight: 600; }
.cc-toc-l3 a { font-size: 0.92em; }

.tpl-dashboard {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--reading-family);
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
}
.cc-dash {
  max-width: 880px;
  margin: 0 auto;
  padding: 48px 24px 96px;
}
.cc-dash-header { margin-bottom: 8px; }
.cc-dash-title {
  font-family: var(--sans);
  font-size: 1.9rem;
  font-weight: 650;
  letter-spacing: -0.02em;
  margin: 0;
}
.cc-dash-sub { color: var(--fg-muted); margin: 6px 0 0; font-size: 1.05rem; }
.cc-dash-meta { color: var(--fg-faint); margin: 10px 0 0; font-size: 0.85rem; font-family: var(--mono); }
.cc-dash-rollup { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.cc-roll {
  font-size: 0.78rem;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid var(--border-strong);
  color: var(--fg-muted);
}
.cc-dash-section { margin-top: 36px; }
.cc-dash-h {
  font-family: var(--sans);
  font-size: 1.15rem;
  font-weight: 620;
  margin: 0 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.cc-dash-summary { color: var(--fg-muted); margin-bottom: 14px; }
.cc-dash-items { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.cc-dash-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.cc-item-body { flex: 1; min-width: 0; }
.cc-item-label { margin: 0; font-weight: 560; }
.cc-item-detail { color: var(--fg-muted); font-size: 0.95rem; margin-top: 4px; }
.cc-item-detail > :first-child { margin-top: 0; }
.cc-item-detail > :last-child { margin-bottom: 0; }
.cc-dash-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
.cc-dash-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  border-bottom: 1px solid var(--accent-line);
}
.cc-dash-link:hover { border-bottom-color: var(--accent); }
.cc-status {
  flex: none;
  font-size: 0.72rem;
  font-weight: 650;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
  margin-top: 2px;
}
.cc-status-done { background: rgba(22, 128, 80, 0.13); color: #1f7a4d; }
.cc-status-in_progress { background: var(--accent-soft); color: var(--accent); }
.cc-status-pending { background: var(--bg-sunken); color: var(--fg-faint); }
.cc-status-blocked { background: rgba(190, 40, 40, 0.13); color: #b3261e; }
.cc-status-decision { background: rgba(180, 120, 10, 0.15); color: #9a6a00; }
.cc-copy { margin-top: 10px; display: flex; gap: 8px; align-items: flex-start; }
.cc-copy-text {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.82rem;
  line-height: 1.5;
  background: var(--code-bg);
  color: var(--code-fg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  resize: vertical;
  min-height: 2.4em;
}
.cc-copy-btn {
  flex: none;
  font: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 7px 12px;
}
.cc-copy-btn:hover { filter: brightness(1.06); }
.cc-copy-btn.is-copied { background: #1f7a4d; }
@media (max-width: 540px) {
  .cc-dash { padding: 28px 16px 64px; }
  .cc-dash-title { font-size: 1.55rem; }
  .cc-dash-item { flex-direction: column; gap: 8px; }
  .cc-copy { flex-direction: column; }
  .cc-copy-btn { align-self: flex-start; }
}
</style>

</div><ul class="cc-dash-items"><li class="cc-dash-item" data-status="in_progress"><span class="cc-status cc-status-in_progress">In progress</span><div class="cc-item-body"><p class="cc-item-label">Port command system</p><div class="cc-item-detail"><p>on a branch</p>
</div><div class="cc-dash-links"><a class="cc-dash-link" href="https://example.com/pr/3" rel="noopener noreferrer">PR #3</a></div></div></li></ul></section><section class="cc-dash-section"><h2 class="cc-dash-h">Next</h2><ul class="cc-dash-items"><li class="cc-dash-item" data-status="decision"><span class="cc-status cc-status-decision">Needs you</span><div class="cc-item-body"><p class="cc-item-label">Run release</p><div class="cc-copy"><textarea class="cc-copy-text" readonly rows="3">/release patch</textarea><button class="cc-copy-btn" type="button">Copy</button></div></div></li><li class="cc-dash-item" data-status="done"><span class="cc-status cc-status-done">Done</span><div class="cc-item-body"><p class="cc-item-label">Shipped</p></div></li></ul></section></div>



<script>(function () {
  'use strict';

  function flash(btn) {
    var original = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('is-copied');
    setTimeout(function () {
      btn.textContent = original;
      btn.classList.remove('is-copied');
    }, 1200);
  }

  function legacyCopy(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'absolute';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (_e) {
      return false;
    }
  }

  // file:// is not a secure context in several browsers, so navigator.clipboard
  // can be absent or reject. Fall back to execCommand, which works from file://.
  function copyText(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function () { flash(btn); },
        function () { if (legacyCopy(text)) flash(btn); }
      );
      return;
    }
    if (legacyCopy(text)) flash(btn);
  }

  document.addEventListener('click', function (event) {
    var btn = event.target.closest ? event.target.closest('.cc-copy-btn') : null;
    if (!btn) return;
    var wrap = btn.closest('.cc-copy');
    var field = wrap ? wrap.querySelector('.cc-copy-text') : null;
    if (!field) return;
    copyText(field.value, btn);
  });
})();
</script>
