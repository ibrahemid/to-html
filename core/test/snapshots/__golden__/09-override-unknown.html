<title>Fallback test</title>
<style>:root {
  color-scheme: light dark;
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --accent: #6d28d9;
  --accent-soft: rgba(109, 40, 217, 0.08);
  --accent-line: rgba(109, 40, 217, 0.2);
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;
  --serif: "Charter", "Iowan Old Style", "Source Serif Pro", "Georgia", "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --mono: ui-monospace, "JetBrains Mono", "SF Mono", "Fira Code", Menlo, Consolas, monospace;
  --reading-family: var(--sans);
  --reading-size: 18px;
  --reading-leading: 1.62;
  --reading-measure: 66ch;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 14px;
}

:root[data-theme="light"] { color-scheme: light; }
:root[data-theme="dark"],
:root[data-theme="sepia"] { color-scheme: dark; }

:root[data-size="s"]  { --reading-size: 16px; }
:root[data-size="m"]  { --reading-size: 18px; }
:root[data-size="l"]  { --reading-size: 19.5px; }
:root[data-size="xl"] { --reading-size: 21px; }

:root[data-width="narrow"]      { --reading-measure: 56ch; }
:root[data-width="comfortable"] { --reading-measure: 66ch; }
:root[data-width="wide"]        { --reading-measure: 76ch; }

:root[data-family="serif"] { --reading-family: var(--serif); }
:root[data-family="sans"]  { --reading-family: var(--sans); }

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e0e10;
    --bg-elev: #17171a;
    --bg-sunken: #0a0a0c;
    --fg: #e8e8ee;
    --fg-muted: #b3b3bb;
    --fg-faint: #9e9ea6;
    --accent: #c4b5fd;
    --accent-soft: rgba(196, 181, 253, 0.10);
    --accent-line: rgba(196, 181, 253, 0.28);
    --border: #26262b;
    --border-strong: #3a3a40;
    --code-bg: #1a1a1f;
    --code-fg: #e8e8ee;
  }
}

:root[data-theme="dark"] {
  --bg: #0e0e10;
  --bg-elev: #17171a;
  --bg-sunken: #0a0a0c;
  --fg: #e8e8ee;
  --fg-muted: #b3b3bb;
  --fg-faint: #9e9ea6;
  --accent: #c4b5fd;
  --accent-soft: rgba(196, 181, 253, 0.10);
  --accent-line: rgba(196, 181, 253, 0.28);
  --border: #26262b;
  --border-strong: #3a3a40;
  --code-bg: #1a1a1f;
  --code-fg: #e8e8ee;
}

:root[data-theme="light"] {
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;
}

:root[data-theme="sepia"] {
  --bg: #f4ecd8;
  --bg-elev: #faf3e0;
  --bg-sunken: #ede2c4;
  --fg: #4a3a22;
  --fg-muted: #6b573b;
  --fg-faint: #6d5d40;
  --accent: #934f1b;
  --accent-soft: rgba(147, 79, 27, 0.08);
  --accent-line: rgba(147, 79, 27, 0.22);
  --border: #d9c8a3;
  --border-strong: #c2ad7f;
  --code-bg: #ebdfc2;
  --code-fg: #4a3a22;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection {
  background: var(--accent-soft);
  color: var(--fg);
}

a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-line);
  transition: border-color 120ms ease;
}

@media (prefers-reduced-motion: reduce) {
  a { transition: none !important; }
  .cc-section-flash { animation: none !important; }
}
a:hover { border-bottom-color: var(--accent); }

code {
  font-family: var(--mono);
  font-size: 0.875em;
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 4px;
}

pre {
  background: var(--code-bg);
  color: var(--code-fg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  overflow-x: auto;
  font-size: 0.875rem;
  line-height: 1.6;
}
pre code { background: transparent; padding: 0; font-size: inherit; }

table {
  border-collapse: collapse;
  width: 100%;
  margin: 1.2em 0;
  font-size: 0.9375rem;
}
th, td {
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
th {
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
}

hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 2.4em 0;
}

blockquote {
  margin: 1.2em 0;
  padding: 4px 0 4px 20px;
  border-left: 2px solid var(--accent-line);
  color: var(--fg-muted);
  font-style: italic;
}

.cc-stamp {
  position: fixed;
  bottom: 14px;
  left: 16px;
  font-family: var(--mono);
  font-size: 0.6875rem;
  color: var(--fg-faint);
  letter-spacing: 0.04em;
  z-index: 10;
}

.cc-tldr {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 28px auto 0;
  padding: 18px 22px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  background: var(--bg-elev);
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 18px;
  align-items: start;
}

.cc-tldr-label {
  font-family: var(--mono);
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  padding-top: 4px;
}

.cc-tldr-body {
  color: var(--fg);
  font-size: 1rem;
  line-height: 1.55;
}

.cc-tldr-body p { margin: 0 0 0.5em; }
.cc-tldr-body p:last-child { margin-bottom: 0; }

.cc-map {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 20px auto 0;
}

.cc-map-toc {
  padding: 12px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
}

.cc-toc-rail .cc-toc-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
}

.cc-toc-item a {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--fg-muted);
  border: none;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--bg-sunken);
}

.cc-toc-item a:hover {
  color: var(--fg);
  background: var(--accent-soft);
}

.cc-toc-l1 a { color: var(--fg); font-weight: 600; }
.cc-toc-l3 a { font-size: 0.92em; }

.cc-search {
  position: fixed;
  top: 14px;
  left: 20px;
  z-index: 12;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0 4px;
  opacity: 0.6;
  transition: opacity 160ms ease, border-color 160ms ease;
}
.cc-search:hover, .cc-search:focus-within { opacity: 1; border-color: var(--border-strong); }

.cc-search-input {
  border: 0;
  background: transparent;
  font: inherit;
  font-size: 0.82rem;
  font-family: var(--mono);
  color: var(--fg);
  padding: 6px 14px;
  width: 240px;
  outline: none;
}
.cc-search-input::placeholder { color: var(--fg-faint); }

.cc-gear-toggle {
  position: fixed;
  top: 12px;
  right: 16px;
  z-index: 12;
  width: 32px;
  height: 32px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--fg-muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.cc-gear-toggle:hover { color: var(--fg); border-color: var(--border-strong); }

.cc-gear-panel {
  position: fixed;
  top: 52px;
  right: 16px;
  z-index: 13;
  width: 280px;
  padding: 16px 18px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 36px rgba(0,0,0,0.18);
  font-size: 0.82rem;
}

.cc-fieldset {
  border: none;
  margin: 0 0 12px;
  padding: 0;
}
.cc-fieldset:last-child { margin-bottom: 0; }
.cc-fieldset legend {
  font-family: var(--mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--fg-muted);
  padding: 0;
  margin-bottom: 6px;
}

.cc-opts {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.cc-opt {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  background: var(--bg);
  color: var(--fg-muted);
  font-size: 0.78rem;
}

.cc-opt input { position: absolute; opacity: 0; pointer-events: none; }
.cc-opt:hover { border-color: var(--border-strong); color: var(--fg); }
.cc-opt:has(input:checked) {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--fg);
}

.cc-stepper {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 11;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: 999px;
  padding: 6px 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14);
  font-family: var(--mono);
  font-size: 0.78rem;
}

.cc-step-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--fg-muted);
  font-size: 1.1rem;
  cursor: pointer;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.cc-step-btn:hover { background: var(--bg-sunken); color: var(--fg); }
.cc-step-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.cc-step-status {
  display: inline-flex;
  align-items: baseline;
  gap: 10px;
  padding: 0 6px;
  max-width: 50vw;
}

.cc-step-pos {
  color: var(--accent);
  font-weight: 600;
}

.cc-step-title {
  color: var(--fg);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 320px;
}

body.cc-hide-tldr .cc-tldr { display: none; }
body.cc-hide-map .cc-map { display: none; }
body.cc-hide-stepper .cc-stepper { display: none; }

.cc-section-dim { opacity: 0.25; }
.cc-section-hit { background: var(--accent-soft); border-radius: 4px; }

@media (max-width: 720px) {
  .cc-search { display: none; }
  .cc-step-title { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  .cc-search,
  .cc-opt,
  .tpl-plan .summary-bar .fill {
    transition: none !important;
  }
}

body.tpl-prose {
  max-width: calc(var(--reading-measure) + 80px);
  margin: 0 auto;
  padding: 64px 32px 96px;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--reading-family);
}

.tpl-prose .prose-head {
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.tpl-prose .prose-title {
  font-family: inherit;
  font-weight: 700;
  font-size: clamp(1.9rem, 4.4vw, 2.6rem);
  line-height: 1.15;
  letter-spacing: -0.015em;
  margin: 0;
  color: var(--fg);
}

.tpl-prose .prose {
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
  color: var(--fg);
  max-width: var(--reading-measure);
}

.tpl-prose .prose h2 {
  font-family: inherit;
  font-weight: 650;
  font-size: 1.32rem;
  letter-spacing: -0.01em;
  line-height: 1.3;
  margin: 2em 0 0.5em;
  color: var(--fg);
}

.tpl-prose .prose h3 {
  font-family: inherit;
  font-weight: 650;
  font-size: 1.08rem;
  margin: 1.6em 0 0.4em;
  color: var(--fg);
}

.tpl-prose .prose h4 {
  font-family: var(--mono);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--fg-muted);
  margin: 1.4em 0 0.4em;
  font-weight: 500;
}

.tpl-prose .prose p {
  margin: 0 0 1em;
}

.tpl-prose .prose a {
  color: var(--accent);
  border-bottom: 1px solid var(--accent-line);
}
.tpl-prose .prose a:hover { border-bottom-color: var(--accent); }

.tpl-prose .prose code {
  font-family: var(--mono);
  font-size: 0.86em;
  background: var(--code-bg);
  color: var(--code-fg);
  padding: 1px 6px;
  border-radius: 4px;
}

.tpl-prose .prose pre {
  background: var(--code-bg);
  color: var(--code-fg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 1.4em 0;
  overflow-x: auto;
  font-size: 0.86rem;
  line-height: 1.55;
}

.tpl-prose .prose pre code {
  background: transparent;
  color: inherit;
  padding: 0;
  font-size: inherit;
}

.tpl-prose .prose blockquote {
  margin: 1.4em 0;
  padding: 4px 0 4px 18px;
  border-left: 2px solid var(--accent-line);
  color: var(--fg-muted);
}

.tpl-prose .prose blockquote p { margin: 0; }

.tpl-prose .prose ul,
.tpl-prose .prose ol {
  padding-left: 24px;
  margin: 1em 0;
}

.tpl-prose .prose li { margin: 0.3em 0; }

.tpl-prose .prose hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 2em 0;
}

.tpl-prose .prose table {
  border-collapse: collapse;
  width: 100%;
  margin: 1.4em 0;
  font-size: 0.94em;
}

.tpl-prose .prose th,
.tpl-prose .prose td {
  text-align: left;
  padding: 9px 14px 9px 0;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.tpl-prose .prose thead th {
  border-bottom: 1px solid var(--border-strong);
  font-weight: 600;
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-muted);
}

.tpl-prose .prose strong { font-weight: 700; color: var(--fg); }
.tpl-prose .prose em { font-style: italic; color: var(--fg); }

.tpl-prose .prose img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 1.6em auto;
}

@media (max-width: 720px) {
  body.tpl-prose { padding: 40px 20px 64px; }
}
</style>

    if (/^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)) return true;
    if (el.isContentEditable) return true;
    return el.closest('[role="slider"],[role="radio"],[role="combobox"],[role="textbox"],[role="spinbutton"]') != null;
  }

  function getFocusable(container) {
    return Array.from(container.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'))
      .filter(function (el) { return !el.disabled && el.offsetParent !== null; });
  }

  function wireGear(state) {
    var toggle = $('.cc-gear-toggle');
    var panel = $('.cc-gear-panel');
    if (!toggle || !panel) return;

    function openPanel() {
      panel.hidden = false;
      toggle.setAttribute('aria-expanded', 'true');
      var focusable = getFocusable(panel);
      if (focusable.length > 0) focusable[0].focus();
    }

    function closePanel() {
      panel.hidden = true;
      toggle.setAttribute('aria-expanded', 'false');
      toggle.focus();
    }

    toggle.addEventListener('click', function () {
      if (panel.hidden === false) closePanel();
      else openPanel();
    });

    document.addEventListener('click', function (ev) {
      if (panel.hidden) return;
      if (ev.target.closest('.cc-gear-panel') || ev.target.closest('.cc-gear-toggle')) return;
      closePanel();
    });

    document.addEventListener('keydown', function (ev) {
      if (panel.hidden) return;
      if (ev.key === 'Escape') {
        ev.stopPropagation();
        closePanel();
        return;
      }
      if (ev.key === 'Tab') {
        var focusable = getFocusable(panel);
        if (focusable.length === 0) { ev.preventDefault(); return; }
        var first = focusable[0];
        var last = focusable[focusable.length - 1];
        if (ev.shiftKey) {
          if (document.activeElement === first) { ev.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { ev.preventDefault(); first.focus(); }
        }
      }
    });

    UI_KEYS.forEach(function (k) {
      $$('input[name="cc-' + k + '"]', panel).forEach(function (input) {
        input.addEventListener('change', function () {
          if (!input.checked) return;
          state[k] = input.value;
          applyUi(state);
          writeStorage(state);
        });
      });
    });

    SECTION_TOGGLE_KEYS.forEach(function (k) {
      var input = $('input[name="cc-show-' + k + '"]', panel);
      if (!input) return;
      var key = 'show' + k.charAt(0).toUpperCase() + k.slice(1);
      if (state[key] === false) input.checked = false;
      input.addEventListener('change', function () {
        state[key] = input.checked;
        applyUi(state);
        writeStorage(state);
      });
    });
  }

  function wireSearch(sections) {
    var input = $('.cc-search-input');
    if (!input) return;

    document.addEventListener('keydown', function (ev) {
      if (inInteractive(ev.target)) return;
      if (ev.key === '/') {
        if (ev.metaKey || ev.ctrlKey || ev.altKey) return;
        ev.preventDefault();
        input.focus();
        input.select();
      }
    });

    function filter(q) {
      var query = String(q || '').trim().toLowerCase();
      sections.forEach(function (s) {
        var anchor = document.getElementById(s.slug);
        if (!anchor) return;
        var heading = anchor.nextElementSibling;
        if (!heading) return;
        var match = !query || s.text.toLowerCase().indexOf(query) !== -1;
        if (match) {
          heading.classList.remove('cc-section-dim');
          if (query) heading.classList.add('cc-section-hit');
          else heading.classList.remove('cc-section-hit');
        } else {
          heading.classList.add('cc-section-dim');
          heading.classList.remove('cc-section-hit');
        }
      });
      $$('.diagram-svg .node').forEach(function (node) {
        var label = (node.getAttribute('aria-label') || '').toLowerCase();
        if (!query || label.indexOf(query) !== -1) node.classList.remove('cc-section-dim');
        else node.classList.add('cc-section-dim');
      });
    }

    input.addEventListener('input', function () { filter(input.value); });
    input.addEventListener('keydown', function (ev) {
      if (ev.key === 'Escape') { input.value = ''; filter(''); input.blur(); }
    });
  }

  function wireStepper(sections) {
    var nav = $('.cc-stepper');
    if (!nav || sections.length < 2) return;
    var prev = $('.cc-step-prev', nav);
    var next = $('.cc-step-next', nav);
    var pos = $('.cc-step-pos', nav);
    var title = $('.cc-step-title', nav);
    var idx = 0;

    function update() {
      pos.textContent = (idx + 1) + ' / ' + sections.length;
      title.textContent = sections[idx].text;
      prev.disabled = idx === 0;
      next.disabled = idx === sections.length - 1;
      $$('.cc-toc-item a').forEach(function (a) {
        var s = a.getAttribute('data-section');
        if (s === sections[idx].slug) a.classList.add('cc-step-current');
        else a.classList.remove('cc-step-current');
      });
      $$('.diagram-svg .node').forEach(function (n) {
        var target = n.getAttribute('data-target-section');
        if (target === sections[idx].slug) n.classList.add('is-active');
        else n.classList.remove('is-active');
      });
    }

    function go(delta) {
      var nextIdx = Math.max(0, Math.min(sections.length - 1, idx + delta));
      if (nextIdx === idx) return;
      idx = nextIdx;
      var anchor = document.getElementById(sections[idx].slug);
      if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
      update();
    }

    prev.addEventListener('click', function () { go(-1); });
    next.addEventListener('click', function () { go(1); });

    document.addEventListener('keydown', function (ev) {
      if (inInteractive(ev.target)) return;
      if (ev.key === 'j' || ev.key === 'ArrowRight') { ev.preventDefault(); go(1); }
      else if (ev.key === 'k' || ev.key === 'ArrowLeft') { ev.preventDefault(); go(-1); }
    });

    update();
  }

  function init() {
    var stored = readStorage() || {};
    var dom = currentUiFromDom();
    var state = {
      theme: stored.theme || dom.theme || 'auto',
      size: stored.size || dom.size || 'm',
      width: stored.width || dom.width || 'comfortable',
      family: stored.family || dom.family || 'sans',
      showTldr: stored.showTldr !== false,
      showMap: stored.showMap !== false,
      showStepper: stored.showStepper !== false
    };
    applyUi(state);

    UI_KEYS.forEach(function (k) {
      var input = $('input[name="cc-' + k + '"][value="' + state[k] + '"]');
      if (input) input.checked = true;
    });

    wireGear(state);
    var sections = readSections();
    wireSearch(sections);
    wireStepper(sections);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
