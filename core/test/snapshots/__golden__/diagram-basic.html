<!doctype html>
<html lang="en" dir="auto">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">


<title>Render pipeline</title>
<style>/* to-html design system: the single source of truth for every artifact surface.
   Layer 1 (this file): design tokens. Layer 2: base.css primitives. Layer 3: per-kind css.
   Every value a kind or the shell consumes is a token defined here. No kind invents color. */

:root {
  color-scheme: light dark;

  /* Type: system-font stacks only (artifacts run under a CSP that forbids web fonts). */
  --font-serif: "Charter", "Iowan Old Style", "Source Serif Pro", "Georgia", "Times New Roman", serif;
  --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", "Fira Code", Menlo, Consolas, monospace;

  /* Type scale: fixed steps for chrome/labels (body text follows --reading-size). ~1.2 ratio. */
  --text-2xs: 0.6875rem;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-cap: 0.875rem;
  --text-base: 0.9375rem;
  --text-md: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.375rem;
  --text-2xl: 1.75rem;
  --text-3xl: 2.25rem;

  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.55;
  --leading-relaxed: 1.62;

  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Tracking: the mono eyebrow/label voice. */
  --tracking-label: 0.08em;
  --tracking-wide: 0.14em;

  /* Space: 4px grid. */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;
  --sp-8: 64px;
  --sp-9: 96px;

  /* Shape. */
  --radius-xs: 3px;
  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 999px;
  --border-hair: 1px;
  --border-strong-w: 2px;

  /* Motion. */
  --dur-fast: 120ms;
  --dur-med: 200ms;
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);

  /* Elevation: borders and tint carry structure (print-safe, calm, theme-portable).
     Shadows are a hover-only accent, suppressed for print and reduced-motion. */
  --shadow-1: 0 1px 2px rgba(15, 15, 20, 0.05);
  --shadow-2: 0 6px 24px -8px rgba(15, 15, 20, 0.18);

  /* Reading controls (user-tunable via data-size / data-width / data-family). */
  --reading-family: var(--font-sans);
  --reading-size: 18px;
  --reading-leading: var(--leading-relaxed);
  --reading-measure: 66ch;

  /* Content max-width for chrome (dashboards, reports, etc.). */
  --content-measure: 880px;

  /* Surface + text roles. Light is the default; themes override below. */
  --bg: #fbfaf6;
  --bg-elev: #ffffff;
  --bg-sunken: #f1f0eb;
  --fg: #15151a;
  --fg-muted: #555560;
  --fg-faint: #6f6f78;
  --border: #e4e2dc;
  --border-strong: #d0cdc4;
  --code-bg: #f1efea;
  --code-fg: #15151a;

  /* Accent: one interactive hue (indigo-violet ink), the hue maximally separated from
     the semantic tone lanes (red / amber / green) so status color never collides with
     interaction color, and far enough off blue not to read as a default hyperlink. */
  --accent: #4a37c8;
  --accent-solid: #5646d8;
  --accent-on: #ffffff;
  --accent-soft: rgba(74, 55, 200, 0.08);
  --accent-line: rgba(74, 55, 200, 0.26);

  --focus-ring: var(--accent);

  /* Semantic tones. Each: -fg (text/icon), -bg (tint fill), -bd (border). Theme-tuned. */
  --tone-pos-fg: #1a7a4e;
  --tone-pos-bg: rgba(26, 122, 78, 0.11);
  --tone-pos-bd: rgba(26, 122, 78, 0.30);
  --tone-neg-fg: #c0362c;
  --tone-neg-bg: rgba(192, 54, 44, 0.11);
  --tone-neg-bd: rgba(192, 54, 44, 0.30);
  --tone-warn-fg: #96631a;
  --tone-warn-bg: rgba(180, 120, 10, 0.14);
  --tone-warn-bd: rgba(180, 120, 10, 0.32);
  --tone-info-fg: #2f5bd0;
  --tone-info-bg: rgba(47, 91, 208, 0.10);
  --tone-info-bd: rgba(47, 91, 208, 0.28);
  --tone-hot-fg: #c2410c;
  --tone-hot-bg: rgba(194, 65, 12, 0.12);
  --tone-hot-bd: rgba(194, 65, 12, 0.30);
  --tone-muted-fg: var(--fg-faint);
  --tone-muted-bg: var(--bg-sunken);
  --tone-muted-bd: var(--border-strong);
}

/* Reading controls. */
:root[data-size="s"]  { --reading-size: 16px; }
:root[data-size="m"]  { --reading-size: 18px; }
:root[data-size="l"]  { --reading-size: 19.5px; }
:root[data-size="xl"] { --reading-size: 21px; }

:root[data-width="narrow"]      { --reading-measure: 56ch; }
:root[data-width="comfortable"] { --reading-measure: 66ch; }
:root[data-width="wide"]        { --reading-measure: 76ch; }

:root[data-family="serif"] { --reading-family: var(--font-serif); }
:root[data-family="sans"]  { --reading-family: var(--font-sans); }

:root[data-theme="light"] { color-scheme: light; }
:root[data-theme="sepia"] { color-scheme: light; }
:root[data-theme="dark"]  { color-scheme: dark; }

/* Dark tokens: applied by OS preference and by explicit data-theme="dark". */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e0e10;
    --bg-elev: #17171a;
    --bg-sunken: #0a0a0c;
    --fg: #e8e8ee;
    --fg-muted: #b3b3bb;
    --fg-faint: #9e9ea6;
    --border: #26262b;
    --border-strong: #3a3a40;
    --code-bg: #1a1a1f;
    --code-fg: #e8e8ee;

    --accent: #a99bff;
    --accent-solid: #5648d6;
    --accent-on: #ffffff;
    --accent-soft: rgba(169, 155, 255, 0.12);
    --accent-line: rgba(169, 155, 255, 0.30);

    --tone-pos-fg: #4ecb8b;
    --tone-pos-bg: rgba(78, 203, 139, 0.14);
    --tone-pos-bd: rgba(78, 203, 139, 0.30);
    --tone-neg-fg: #ff6b60;
    --tone-neg-bg: rgba(255, 107, 96, 0.15);
    --tone-neg-bd: rgba(255, 107, 96, 0.32);
    --tone-warn-fg: #e0b24d;
    --tone-warn-bg: rgba(224, 178, 77, 0.15);
    --tone-warn-bd: rgba(224, 178, 77, 0.30);
    --tone-info-fg: #8fa8ff;
    --tone-info-bg: rgba(143, 168, 255, 0.15);
    --tone-info-bd: rgba(143, 168, 255, 0.30);
    --tone-hot-fg: #ff9d5c;
    --tone-hot-bg: rgba(255, 157, 92, 0.15);
    --tone-hot-bd: rgba(255, 157, 92, 0.30);

    --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-2: 0 8px 28px -8px rgba(0, 0, 0, 0.6);
  }
}

/* to-html design system, layer 2: primitives. Resets, element styles, focus, print,
   and the shared component vocabulary (eyebrow label, tone pill) that every kind
   consumes. Reads only from tokens.css; defines no raw color or bare spacing value. */

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: var(--reading-size);
  line-height: var(--reading-leading);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern", "liga";
}

::selection {
  background: var(--accent-soft);
  color: var(--fg);
}

a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: var(--border-hair) solid var(--accent-line);
  transition: border-color var(--dur-fast) var(--ease-standard);
}
a:hover { border-bottom-color: var(--accent); }

:focus-visible {
  outline: var(--border-strong-w) solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

code {
  font-family: var(--font-mono);
  font-size: 0.875em;
  font-variant-ligatures: none;
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: var(--radius-xs);
}

pre {
  background: var(--code-bg);
  color: var(--code-fg);
  border: var(--border-hair) solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--sp-4) var(--sp-5);
  overflow-x: auto;
  font-size: 0.875rem;
  line-height: var(--leading-normal);
}
pre code { background: transparent; padding: 0; font-size: inherit; }

table {
  border-collapse: collapse;
  width: 100%;
  margin: 1.2em 0;
  font-size: var(--text-base);
}
th, td {
  text-align: start;
  padding: var(--sp-3) var(--sp-4);
  border-bottom: var(--border-hair) solid var(--border);
}
th {
  font-weight: var(--weight-semibold);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
}

hr {
  border: none;
  height: var(--border-hair);
  background: var(--border);
  margin: 2.4em 0;
}

blockquote {
  margin: 1.2em 0;
  padding-block: var(--sp-1);
  padding-inline: var(--sp-5) 0;
  border-inline-start: var(--border-strong-w) solid var(--accent-line);
  color: var(--fg-muted);
  font-style: italic;
}

/* The instrument voice: a mono, tracked, uppercase micro-label. Every kind stamps
   its name with one, which is a load-bearing part of the shared identity. */
.cc-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--fg-faint);
}

/* Tone pill: one geometry, five semantic tones sourced from theme tokens. Dashboard
   statuses and findings severities both render as pills, so a status never invents
   a color and contrast is guaranteed by the token layer. */
.cc-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  line-height: 1.2;
  letter-spacing: 0.01em;
  padding: 3px 9px;
  border-radius: var(--radius-full);
  border: var(--border-hair) solid transparent;
  white-space: nowrap;
}
.cc-pill::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: var(--radius-full);
  background: currentColor;
  flex: none;
}
.cc-pill.is-plain::before { display: none; }

.tone-pos    { color: var(--tone-pos-fg);  background: var(--tone-pos-bg);  border-color: var(--tone-pos-bd); }
.tone-neg    { color: var(--tone-neg-fg);  background: var(--tone-neg-bg);  border-color: var(--tone-neg-bd); }
.tone-warn   { color: var(--tone-warn-fg); background: var(--tone-warn-bg); border-color: var(--tone-warn-bd); }
.tone-hot    { color: var(--tone-hot-fg);  background: var(--tone-hot-bg);  border-color: var(--tone-hot-bd); }
.tone-info   { color: var(--tone-info-fg); background: var(--tone-info-bg); border-color: var(--tone-info-bd); }
.tone-muted  { color: var(--tone-muted-fg); background: var(--tone-muted-bg); border-color: var(--tone-muted-bd); }
.tone-accent { color: var(--accent);       background: var(--accent-soft);  border-color: var(--accent-line); }

/* Diagram wrapper (the SVG map centers within this column). */
.cc-map {
  max-width: calc(var(--reading-measure) + 80px);
  margin: var(--sp-5) auto 0;
}

.cc-stamp {
  position: fixed;
  inset-block-end: var(--sp-3);
  inset-inline-start: var(--sp-4);
  font-family: var(--font-mono);
  font-size: var(--text-2xs);
  color: var(--fg-faint);
  letter-spacing: 0.04em;
  z-index: 10;
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; scroll-behavior: auto !important; }
}

@media print {
  html, body { background: #fff; color: #000; }
  .cc-stamp { display: none; }
  a { color: #000; }
  * { box-shadow: none !important; }
  @page { margin: 16mm; }
}

.cc-map-graph {
  max-width: calc(var(--reading-measure) + 320px);
  margin: 24px auto 0;
}

.cc-map-figure {
  margin: 0;
  position: relative;
}

.cc-map-canvas {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  overflow: hidden;
  position: relative;
  touch-action: none;
  cursor: grab;
}

.cc-map-canvas.is-dragging { cursor: grabbing; }

.cc-map-canvas::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.06) 1px, transparent 1px);
  background-size: 22px 22px;
  opacity: 0.5;
  border-radius: inherit;
}

@media (prefers-color-scheme: dark) {
  .cc-map-canvas::before {
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 1px);
  }
}

:root[data-theme="dark"] .cc-map-canvas::before {
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 1px);
}

.cc-map .diagram-svg {
  display: block;
  width: 100%;
  height: auto;
  min-height: 320px;
  max-height: 720px;
  position: relative;
  z-index: 1;
}

.cc-map .node {
  cursor: pointer;
  transition: opacity 200ms ease, transform 220ms cubic-bezier(.2,.7,.2,1);
  outline: 2px solid transparent;
}

.cc-map .node:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}

.cc-map .node-shape {
  fill: var(--bg);
  stroke: var(--fg-muted);
  stroke-width: 1.5;
  transition: fill 220ms ease, stroke 220ms ease, filter 220ms ease;
  filter: drop-shadow(0 1px 0 rgba(0,0,0,0.04));
}

.cc-map .node-label {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  fill: var(--fg);
  pointer-events: none;
  user-select: none;
}

.cc-map .node-linked .node-shape {
  stroke: var(--accent-line);
}

.cc-map .node:hover .node-shape,
.cc-map .node:focus .node-shape {
  stroke: var(--accent);
  stroke-width: 2;
}

.cc-map .edge-line {
  stroke: var(--fg-faint);
  stroke-width: 1.5;
  fill: none;
  transition: stroke 220ms ease, stroke-width 220ms ease, opacity 220ms ease;
}

.cc-map .arrow-head {
  fill: var(--fg-faint);
  transition: fill 220ms ease;
}

.cc-map .edge-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  fill: var(--fg-muted);
  pointer-events: none;
  user-select: none;
  paint-order: stroke;
  stroke: var(--bg-elev);
  stroke-width: 4;
  stroke-linejoin: round;
}

.cc-map .diagram-svg.has-focus .node:not(.is-active) .node-shape { fill: var(--bg-elev); opacity: 0.4; }
.cc-map .diagram-svg.has-focus .node:not(.is-active) .node-label { opacity: 0.4; }
.cc-map .diagram-svg.has-focus .edge:not(.is-active) .edge-line { opacity: 0.18; }
.cc-map .diagram-svg.has-focus .edge:not(.is-active) .edge-label { opacity: 0.18; }

.cc-map .node.is-active .node-shape {
  fill: var(--accent-soft);
  stroke: var(--accent);
  stroke-width: 2;
}
.cc-map .node.is-active .node-label { fill: var(--fg); font-weight: 700; }

.cc-map .edge.is-active .edge-line { stroke: var(--accent); stroke-width: 2; }
.cc-map .edge.is-active .arrow-head { fill: var(--accent); }
.cc-map .edge.is-active .edge-label { fill: var(--accent); }

.cc-map-controls {
  position: absolute;
  top: 14px;
  right: 14px;
  display: flex;
  gap: 4px;
  z-index: 2;
}

.cc-map-btn {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--fg-muted);
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.cc-map-btn:hover {
  color: var(--fg);
  border-color: var(--border-strong);
}

.cc-map-meta {
  margin: 12px 4px 0;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 20px;

.cc-map-stat {

}

.cc-map-stat .num {

}

.cc-map-stat .lbl {

  letter-spacing: 0.08em;
  color: var(--fg-muted);
}

.cc-map-hint {
  font-size: 0.74rem;
  color: var(--fg-faint);
}

.cc-detail-panel {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: min(440px, calc(100vw - 48px));
  max-height: 60vh;
  overflow-y: auto;
  padding: 20px 22px 18px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 36px rgba(0,0,0,0.18);
  z-index: 20;
}

.cc-detail-close {
  position: absolute;
  top: 8px;
  right: 10px;
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--fg-muted);
  font-size: 1.2rem;
  line-height: 1;
  cursor: pointer;
  border-radius: 6px;
}

.cc-detail-close:hover {
  background: var(--bg-sunken);
  color: var(--fg);
}

.cc-detail-body h1, .cc-detail-body h2, .cc-detail-body h3 {
  margin: 0 0 10px;
  font-size: 1.05rem;
  font-weight: 650;
  color: var(--fg);
}

.cc-detail-body p {
  margin: 0 0 0.6em;
  color: var(--fg-muted);
  font-size: 0.94rem;
  line-height: 1.55;
}

.cc-detail-body p:last-child { margin-bottom: 0; }

.cc-section-flash {
  animation: cc-flash 1.2s ease-out;
}

@keyframes cc-flash {
  0%   { background: var(--accent-soft); }
  100% { background: transparent; }
}

@media (prefers-reduced-motion: reduce) {
  .cc-map .node,
  .cc-map .node-shape,
  .cc-map .edge-line,
  .cc-map .arrow-head {
    transition: none !important;
    animation: none !important;
  }
  .cc-section-flash { animation: none !important; }
}

.tpl-flow {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--reading-family);
}
.cc-flow {
  max-width: 1000px;
  margin: 0 auto;
  padding: var(--sp-7) var(--sp-5) var(--sp-9);
}
.cc-flow-header {
  margin-bottom: var(--sp-5);
  padding-bottom: var(--sp-5);
  border-bottom: var(--border-hair) solid var(--border);
}
.cc-flow-kind { margin: 0 0 var(--sp-3); }
.cc-flow-h1 {

  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;

  margin: 0;
}
.cc-flow-sub { color: var(--fg-muted); margin: var(--sp-2) 0 0; font-size: var(--text-lg); }
.cc-flow-meta-line { color: var(--fg-faint); margin: var(--sp-3) 0 0; font-size: var(--text-xs); font-family: var(--font-mono); }
.tpl-flow .cc-map { margin-top: var(--sp-5); max-width: none; }
.cc-flow-figure { margin: 0; }
.cc-flow-canvas {
  background: var(--bg-elev);
  border: var(--border-hair) solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--sp-5);
  overflow: hidden;
}
@media (max-width: 540px) {

  .cc-flow-h1 { font-size: var(--text-xl); }
  .cc-flow-canvas { padding: var(--sp-3); }
}
</style>
</head>
